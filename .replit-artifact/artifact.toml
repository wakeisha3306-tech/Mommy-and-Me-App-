kind = "web"
previewPath = "/"
title = "Mommy and Me"
version = "1.0.0"
id = "artifacts/mommy-and-me"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20384

[services.development]
run = "pnpm --filter @workspace/mommy-and-me run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mommy-and-me", "run", "build" ]
publicDir = "artifacts/mommy-and-me/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20384"
BASE_PATH = "/"
